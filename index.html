<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Before the Sixth Sun - RA Exposición</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        /* Forzamos que todo el entorno web sea vertical y transparente */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent !important;
        }

        /* Bloqueamos la interfaz de escaneo para que no rompa las dimensiones del viewport */
        .mindar-ui-scanning, .mindar-ui-loading {
            display: none !important;
        }

        /* Letrero flotante de instrucciones centrado y responsivo */
        #scanning-overlay {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 14px 28px;
            border-radius: 24px;
            font-family: sans-serif;
            font-size: 15px;
            font-weight: bold;
            pointer-events: none;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 80%;
            max-width: 300px;
        }
    </style>
</head>
<body>

    <div id="scanning-overlay">Apunta con la cámara al diseño de la exposición...</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; autoStart: true;" 
             embedded
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false"
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true, alpha: true">
        
        <a-assets>
            <a-asset-item id="artworkModel" src="./Before_the_Sixth_Sun_COMPLETO.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="targetAnchor" mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#artworkModel" 
                          position="0 0 0" 
                          rotation="0 0 0" 
                          scale="1 1 1">
            </a-gltf-model>
        </a-entity>
        
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const targetAnchor = document.querySelector('#targetAnchor');
            const overlay = document.querySelector('#scanning-overlay');
            
            if (targetAnchor && overlay) {
                targetAnchor.addEventListener("targetFound", () => {
                    overlay.style.display = "none";
                    console.log("¡Marcador detectado!");
                });
                
                targetAnchor.addEventListener("targetLost", () => {
                    overlay.style.display = "block";
                });
            }
        });
    </script>
</body>
</html>
