<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Before the Sixth Sun - RA Exposición</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        /* Estilos esenciales mínimos para asegurar que la escena ocupe toda la pantalla */
        body {
            margin: 0;
            overflow: hidden;
        }
        /* Letrero flotante de instrucciones nativo */
        #scanning-overlay {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div id="scanning-overlay">Apunta con la cámara al diseño impreso...</div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; filterMinCF:0.001; filterBeta:0.01;" 
             embedded 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights: true" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="artworkModel" src="./Before_the_Sixth_Sun_COMPLETO.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="targetAnchor" mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#artworkModel" 
                          position="0 0 0" 
                          rotation="0 0 0" 
                          scale="1 1 1">
            </a-gltf-model>
        </a-entity>
        
    </a-scene>

    <script>
        // Lógica simplificada de eventos para mostrar/ocultar el letrero de escaneo
        document.addEventListener("DOMContentLoaded", () => {
            const targetAnchor = document.querySelector('#targetAnchor');
            const overlay = document.querySelector('#scanning-overlay');
            
            if (targetAnchor && overlay) {
                targetAnchor.addEventListener("targetFound", () => {
                    overlay.style.display = "none";
                });
                
                targetAnchor.addEventListener("targetLost", () => {
                    overlay.style.display = "block";
                });
            }
        });
    </script>
</body>
</html>
